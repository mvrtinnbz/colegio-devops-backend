name: Deploy Colegio Backend Amazon EKS v3

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  deploy:
    name: Build, Push y Deploy Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build jars backend
        run: |
          set -e

          for service in \
            config-server \
            eureka-server \
            api-gateway \
            auth-service \
            usuario-service \
            academico-service \
            estudiante-service \
            asistencia-service \
            evaluacion-service \
            anotacion-service \
            comunicacion-service \
            notificacion-service \
            reporte-service
          do
            echo "Compilando $service"
            cd "$service"
            mvn clean package -DskipTests
            cd ..
          done

      - name: Build, tag y push images backend
        run: |
          set -e

          docker build -t ${{ secrets.ECR_CONFIG }}:${{ env.IMAGE_TAG }} ./config-server
          docker push ${{ secrets.ECR_CONFIG }}:${{ env.IMAGE_TAG }}

          docker build -t ${{ secrets.ECR_EUREKA }}:${{ env.IMAGE_TAG }} ./eureka-server
          docker push ${{ secrets.ECR_EUREKA }}:${{ env.IMAGE_TAG }}

          docker build -t ${{ secrets.ECR_API }}:${{ env.IMAGE_TAG }} ./api-gateway
          docker push ${{ secrets.ECR_API }}:${{ env.IMAGE_TAG }}

          docker build -t ${{ secrets.ECR_AUTH }}:${{ env.IMAGE_TAG }} ./auth-service
          docker push ${{ secrets.ECR_AUTH }}:${{ env.IMAGE_TAG }}

          docker build -t ${{ secrets.ECR_USUARIO }}:${{ env.IMAGE_TAG }} ./usuario-service
          docker push ${{ secrets.ECR_USUARIO }}:${{ env.IMAGE_TAG }}

          docker build -t ${{ secrets.ECR_ACADEMICO }}:${{ env.IMAGE_TAG }} ./academico-service
          docker push ${{ secrets.ECR_ACADEMICO }}:${{ env.IMAGE_TAG }}

          docker build -t ${{ secrets.ECR_ESTUDIANTE }}:${{ env.IMAGE_TAG }} ./estudiante-service
          docker push ${{ secrets.ECR_ESTUDIANTE }}:${{ env.IMAGE_TAG }}

          docker build -t ${{ secrets.ECR_ASISTENCIA }}:${{ env.IMAGE_TAG }} ./asistencia-service
          docker push ${{ secrets.ECR_ASISTENCIA }}:${{ env.IMAGE_TAG }}

          docker build -t ${{ secrets.ECR_EVALUACION }}:${{ env.IMAGE_TAG }} ./evaluacion-service
          docker push ${{ secrets.ECR_EVALUACION }}:${{ env.IMAGE_TAG }}

          docker build -t ${{ secrets.ECR_ANOTACION }}:${{ env.IMAGE_TAG }} ./anotacion-service
          docker push ${{ secrets.ECR_ANOTACION }}:${{ env.IMAGE_TAG }}

          docker build -t ${{ secrets.ECR_COMUNICACION }}:${{ env.IMAGE_TAG }} ./comunicacion-service
          docker push ${{ secrets.ECR_COMUNICACION }}:${{ env.IMAGE_TAG }}

          docker build -t ${{ secrets.ECR_NOTIFICACION }}:${{ env.IMAGE_TAG }} ./notificacion-service
          docker push ${{ secrets.ECR_NOTIFICACION }}:${{ env.IMAGE_TAG }}

          docker build -t ${{ secrets.ECR_REPORTE }}:${{ env.IMAGE_TAG }} ./reporte-service
          docker push ${{ secrets.ECR_REPORTE }}:${{ env.IMAGE_TAG }}

      - name: Update Kubeconfig EKS
        run: |
          aws eks update-kubeconfig \
            --name ${{ env.EKS_CLUSTER_NAME }} \
            --region ${{ env.AWS_REGION }}

      - name: Deploy Backend EKS
        env:
          ECR_CONFIG: ${{ secrets.ECR_CONFIG }}
          ECR_EUREKA: ${{ secrets.ECR_EUREKA }}
          ECR_API: ${{ secrets.ECR_API }}
          ECR_AUTH: ${{ secrets.ECR_AUTH }}
          ECR_USUARIO: ${{ secrets.ECR_USUARIO }}
          ECR_ACADEMICO: ${{ secrets.ECR_ACADEMICO }}
          ECR_ESTUDIANTE: ${{ secrets.ECR_ESTUDIANTE }}
          ECR_ASISTENCIA: ${{ secrets.ECR_ASISTENCIA }}
          ECR_EVALUACION: ${{ secrets.ECR_EVALUACION }}
          ECR_ANOTACION: ${{ secrets.ECR_ANOTACION }}
          ECR_COMUNICACION: ${{ secrets.ECR_COMUNICACION }}
          ECR_NOTIFICACION: ${{ secrets.ECR_NOTIFICACION }}
          ECR_REPORTE: ${{ secrets.ECR_REPORTE }}
        run: |
          cp k8s/back.yml k8s/back-rendered.yml

          sed -i "s|\${IMAGE_TAG}|$IMAGE_TAG|g" k8s/back-rendered.yml
          sed -i "s|\${ECR_CONFIG}|$ECR_CONFIG|g" k8s/back-rendered.yml
          sed -i "s|\${ECR_EUREKA}|$ECR_EUREKA|g" k8s/back-rendered.yml
          sed -i "s|\${ECR_API}|$ECR_API|g" k8s/back-rendered.yml
          sed -i "s|\${ECR_AUTH}|$ECR_AUTH|g" k8s/back-rendered.yml
          sed -i "s|\${ECR_USUARIO}|$ECR_USUARIO|g" k8s/back-rendered.yml
          sed -i "s|\${ECR_ACADEMICO}|$ECR_ACADEMICO|g" k8s/back-rendered.yml
          sed -i "s|\${ECR_ESTUDIANTE}|$ECR_ESTUDIANTE|g" k8s/back-rendered.yml
          sed -i "s|\${ECR_ASISTENCIA}|$ECR_ASISTENCIA|g" k8s/back-rendered.yml
          sed -i "s|\${ECR_EVALUACION}|$ECR_EVALUACION|g" k8s/back-rendered.yml
          sed -i "s|\${ECR_ANOTACION}|$ECR_ANOTACION|g" k8s/back-rendered.yml
          sed -i "s|\${ECR_COMUNICACION}|$ECR_COMUNICACION|g" k8s/back-rendered.yml
          sed -i "s|\${ECR_NOTIFICACION}|$ECR_NOTIFICACION|g" k8s/back-rendered.yml
          sed -i "s|\${ECR_REPORTE}|$ECR_REPORTE|g" k8s/back-rendered.yml

          kubectl apply -f k8s/back-rendered.yml

      - name: Verificar despliegue backend
        run: |
          kubectl get deployment -o name | xargs -r -n1 kubectl rollout status --timeout=240s
          kubectl get pods
          kubectl get svc
          kubectl get endpoints
